<div class="feature-header">
    <h2>🏘️ Constituency Tracker</h2>
    <p>Track and manage community issues with AI-powered insights</p>
</div>

<div class="stats-grid" style="margin-bottom: 30px;">
    <div class="stat-card orange">
        <div class="stat-icon">⏳</div>
        <div class="stat-info">
            <div class="stat-value" id="pendingCount">0</div>
            <div class="stat-label">Pending</div>
        </div>
    </div>
    <div class="stat-card blue">
        <div class="stat-icon">🔄</div>
        <div class="stat-info">
            <div class="stat-value" id="inProgressCount">0</div>
            <div class="stat-label">In Progress</div>
        </div>
    </div>
    <div class="stat-card green">
        <div class="stat-icon">✅</div>
        <div class="stat-info">
            <div class="stat-value" id="resolvedCount">0</div>
            <div class="stat-label">Resolved</div>
        </div>
    </div>
    <div class="stat-card yellow">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total</div>
        </div>
    </div>
</div>

<div class="feature-grid">
    <div class="feature-card">
        <h3>➕ Report New Issue</h3>
        <form id="issueForm">
            <div class="form-group">
                <label>Category</label>
                <select id="issueCategory">
                    <option value="Water Supply">💧 Water Supply</option>
                    <option value="Roads">🛣️ Roads & Infrastructure</option>
                    <option value="Healthcare">🏥 Healthcare</option>
                    <option value="Education">📚 Education</option>
                    <option value="Electricity">⚡ Electricity</option>
                    <option value="Sanitation">🚽 Sanitation</option>
                    <option value="Agriculture">🌾 Agriculture</option>
                    <option value="Employment">💼 Employment</option>
                    <option value="Other">📋 Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Issue Title</label>
                <input type="text" id="issueTitle" placeholder="Brief title of the issue" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="issueDescription" rows="4" placeholder="Detailed description..." required></textarea>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="issueLocation" placeholder="Village / Ward / Block name" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Priority</label>
                    <select id="issuePriority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Reported By</label>
                    <input type="text" id="issueReportedBy" placeholder="Name / Dept" required>
                </div>
            </div>
            <button type="submit" class="btn btn-warning btn-full">🏘️ Report Issue</button>
        </form>
    </div>

    <div class="feature-card">
        <h3>📊 Issues & Insights</h3>
        <div class="schedule-tabs">
            <button class="schedule-tab active" onclick="refreshIssues()">🔄 Refresh</button>
            <button class="schedule-tab" onclick="showInsights()">📈 Insights</button>
            <button class="schedule-tab" onclick="showStatusReport()">✅ Status Report</button>
        </div>
        <div id="issuesList">
            <div class="empty-state">
                <div class="empty-state-icon">🏘️</div>
                <p>No issues tracked yet</p>
            </div>
        </div>
    </div>
</div>

<script src="js/constituency.js"></script>
