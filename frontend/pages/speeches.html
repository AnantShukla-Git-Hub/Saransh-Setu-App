<div class="feature-header">
    <h2>🎤 Speech Generator</h2>
    <p>AI-assisted speechwriting in any Indian language</p>
</div>

<div class="feature-grid">
    <div class="feature-card">
        <h3>✨ Generate New Speech</h3>
        <form id="speechForm">
            <div class="form-group">
                <label>Speech Title</label>
                <input type="text" id="speechTitle" placeholder="e.g., Independence Day Address" required>
            </div>
            <div class="form-group">
                <label>Occasion</label>
                <input type="text" id="speechOccasion" placeholder="e.g., Republic Day, Inauguration, Constituency" required>
            </div>
            <div class="form-group">
                <label>Context / Background</label>
                <textarea id="speechContext" rows="3" placeholder="Describe the event, audience and purpose..." required></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tone</label>
                    <select id="speechTone">
                        <option value="Formal">Formal</option>
                        <option value="Inspirational">Inspirational</option>
                        <option value="Motivational">Motivational</option>
                        <option value="Celebratory">Celebratory</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="speechDuration" value="5" min="1" max="30" required>
                </div>
            </div>
            <div class="form-group">
                <label>Language</label>
                <div class="language-tabs">
                    <button type="button" class="lang-tab active" data-lang="English">English</button>
                    <button type="button" class="lang-tab" data-lang="Hindi">Hindi</button>
                    <button type="button" class="lang-tab" data-lang="Tamil">Tamil</button>
                    <button type="button" class="lang-tab" data-lang="Telugu">Telugu</button>
                    <button type="button" class="lang-tab" data-lang="Bengali">Bengali</button>
                    <button type="button" class="lang-tab" data-lang="Marathi">Marathi</button>
                </div>
                <input type="hidden" id="speechLanguage" value="English">
            </div>
            <div class="form-group">
                <label>Key Points (one per line)</label>
                <textarea id="speechKeyPoints" rows="5" placeholder="Infrastructure development&#10;Water supply improvement&#10;Women empowerment schemes" required></textarea>
            </div>
            <button type="submit" class="btn btn-warning btn-full">✨ Generate Speech</button>
        </form>
        <div id="speechProgress" style="display: none; margin-top: 20px;">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p class="progress-text">Crafting speech...</p>
        </div>
    </div>

    <div class="feature-card">
        <h3>📜 Generated Speech</h3>
        <div id="speechOutput" class="speech-output">
            <div class="empty-state">
                <div class="empty-state-icon">🎤</div>
                <p>Generate a speech to see it here</p>
            </div>
        </div>
    </div>
</div>

<style>
.language-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
}
.lang-tab {
    padding: 8px 16px;
    border: 2px solid var(--border-color);
    background: var(--bg-color);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}
.lang-tab.active {
    background: var(--primary-blue);
    color: white;
    border-color: var(--primary-blue);
}
.speech-output {
    min-height: 400px;
    padding: 20px;
    background: var(--bg-color);
    border-radius: 8px;
    line-height: 1.8;
    white-space: pre-wrap;
}
</style>

<script src="js/speeches.js"></script>
