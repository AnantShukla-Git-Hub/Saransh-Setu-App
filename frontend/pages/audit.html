<div class="feature-header">
    <h2>📋 Audit Logs</h2>
    <p>Complete trail of all actions for accountability and security</p>
</div>

<div class="feature-card">
    <div class="audit-filters">
        <div class="form-row">
            <div class="form-group">
                <label>Filter by User</label>
                <input type="text" id="userFilter" placeholder="Username...">
            </div>
            <div class="form-group">
                <label>Filter by Action</label>
                <select id="actionFilter">
                    <option value="All Actions">All Actions</option>
                    <option value="login">Login</option>
                    <option value="document_upload">Document Upload</option>
                    <option value="translation">Translation</option>
                    <option value="speech_generation">Speech Generation</option>
                    <option value="meeting_created">Meeting Created</option>
                    <option value="ai_query">AI Query</option>
                    <option value="issue_reported">Issue Reported</option>
                    <option value="schedule_created">Schedule Created</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn btn-primary" onclick="searchLogs()">🔍 Search Logs</button>
            </div>
        </div>
    </div>

    <div class="audit-table-container">
        <table class="audit-table">
            <thead>
                <tr>
                    <th>TIMESTAMP</th>
                    <th>USER</th>
                    <th>ACTION</th>
                    <th>RESOURCE</th>
                    <th>IP ADDRESS</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="auditTableBody">
                <tr>
                    <td colspan="6" style="text-align: center; padding: 40px;">
                        Click "Search Logs" to start audit logs
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<style>
.audit-filters {
    margin-bottom: 24px;
}
.audit-table-container {
    overflow-x: auto;
}
.audit-table {
    width: 100%;
    border-collapse: collapse;
}
.audit-table th {
    background: var(--primary-blue);
    color: white;
    padding: 12px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
}
.audit-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
    font-size: 13px;
}
.audit-table tr:hover {
    background: var(--bg-color);
}
</style>

<script src="js/audit.js"></script>
