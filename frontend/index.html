<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saransh Setu - Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Top Header -->
    <header class="top-header">
        <div class="header-left">
            <div class="logo-section">
                <span class="logo-icon">🏛️</span>
                <div class="logo-text">
                    <div class="hindi-text">सारांश सेतु</div>
                    <div class="english-text">Saransh Setu</div>
                    <div class="tagline">Bridge of Intelligence - Vow of Service</div>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle">
                <span class="theme-icon">☀️</span> Dark
            </button>
            <div class="user-info">
                <span class="user-icon">👤</span>
                <div class="user-details">
                    <div class="user-role">System Administrator</div>
                    <div class="user-name" id="userName">Admin</div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <span class="logout-icon">🚪</span> Logout
            </button>
        </div>
    </header>

    <!-- Navigation Bar -->
    <nav class="main-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#" class="nav-item" data-page="documents">
            <span class="nav-icon">📄</span> Documents
        </a>
        <a href="#" class="nav-item" data-page="meetings">
            <span class="nav-icon">💼</span> Meetings
        </a>
        <a href="#" class="nav-item" data-page="speeches">
            <span class="nav-icon">🎤</span> Speeches
        </a>
        <a href="#" class="nav-item" data-page="schedule">
            <span class="nav-icon">📅</span> Schedule
        </a>
        <a href="#" class="nav-item" data-page="constituency">
            <span class="nav-icon">🏘️</span> Constituency
        </a>
        <a href="#" class="nav-item" data-page="ai-query">
            <span class="nav-icon">🤖</span> AI Query
        </a>
        <a href="#" class="nav-item" data-page="translate">
            <span class="nav-icon">🌐</span> Translate
        </a>
        <a href="#" class="nav-item" data-page="audit">
            <span class="nav-icon">📋</span> Audit Logs
        </a>
        <a href="#" class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span> Settings
        </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Dashboard content will be loaded here -->
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
