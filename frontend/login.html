<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saransh Setu - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="tricolor-bar">
                <div class="orange"></div>
                <div class="green"></div>
            </div>
            
            <div class="logo-section">
                <div class="logo-circle">
                    <span class="logo-icon">🏛️</span>
                </div>
                <h1>Saransh Setu</h1>
                <p class="subtitle">सारांश सेतु - Bridge of Intelligence, Vow of Service</p>
            </div>

            <div class="usb-status">
                <span class="status-indicator">●</span>
                <span class="status-text">USB Security Key: <strong>DEV MODE (Not Required)</strong></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-icon">🔒</span> Secure Login
                </button>
            </form>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <div class="footer-note">
                <span class="lock-icon">🔒</span>
                All data processed locally. No internet required.
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
